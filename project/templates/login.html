<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Campus – Sign In</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
</head>
<body>
<div class="login-wrapper">
  <div class="login-left">
    <div class="left-content">
      <h1 class="brand-title">Smart<br>Campus</h1>
      <p class="brand-sub">STUDY DASHBOARD</p>
      <p class="brand-desc">Your academic life, unified. Schedules, assignments, resources — all in one place.</p>
      <div class="stats-row">
        <div class="stat-item"><div class="stat-val">∞</div><div class="stat-lbl">COURSES</div></div>
        <div class="stat-item"><div class="stat-val">24/7</div><div class="stat-lbl">ACCESS</div></div>
        <div class="stat-item"><div class="stat-val">1</div><div class="stat-lbl">DASHBOARD</div></div>
      </div>
    </div>
  </div>


  <div class="login-right">
    <div class="login-card">
      <p class="welcome-label">WELCOME BACK</p>
      <h2 class="sign-in-title">Sign In</h2>
      <div class="role-toggle">
        <button type="button" class="role-btn active" id="btnStudent" onclick="selectRole('student')">Student</button>
        <button type="button" class="role-btn"        id="btnAdmin"   onclick="selectRole('admin')">Admin</button>
      </div>

      <form method="POST" action="/login" id="loginForm">
        <input type="hidden" name="role" id="roleInput" value="student">

        <div class="form-group-custom">
          <label class="field-label" id="userLabel">STUDENT ID</label>
          <input type="text" name="username" id="usernameField" class="input-field" placeholder="AM.SC.U4CSE25249">
          <span class="field-error" id="usernameError"></span>
        </div>

        <div class="form-group-custom">
          <label class="field-label">PASSWORD</label>
          <input type="password" name="password" id="passwordField" class="input-field" placeholder="••••••••">
          <span class="field-error" id="passwordError"></span>
        </div>

        {% if error %}
        <div class="server-error">{{ error }}</div>
        {% endif %}

        <button type="submit" class="signin-btn" onclick="return validateForm()">Sign In →</button>
      </form>
    </div>
  </div>

</div>
<script src="{{ url_for('static', filename='js/login.js') }}"></script>
</body>
</html>
